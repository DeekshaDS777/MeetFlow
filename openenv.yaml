name: meetflow_workflow_env
description: Multi-step meeting workflow automation environment
version: 2.0.0

entrypoint:
  module: server.app
  app: app

api:
  base_url: http://localhost:7860

metadata:
  domain: meeting_operations
  modality: text
  reward_range: [0.0, 1.0]
  long_horizon: true
  grader_type: deterministic_structured_grader

endpoints:
  reset: /reset
  step: /step
  state: /state

tasks:
  - name: easy
    description: Simple workflow extraction
  - name: medium
    description: Moderate reasoning workflows
  - name: hard
    description: Complex multi-step workflows

models:
  observation: env.models.Observation
  action: env.models.Action
  reward: env.models.Reward